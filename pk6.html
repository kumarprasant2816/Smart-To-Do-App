<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart To Do App</title>

    <link rel="stylesheet" href="style6.css">

</head>

<body>

    <div class="container">

        <h1> Smart To Do App</h1>

        <!-- Add Task -->

        <div class="input-box">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter Task">

            <input
                type="date"
                id="taskDate">

            <input
                type="time"
                id="taskTime">

            <select id="priority">

                <option value="High">High Priority</option>

                <option value="Medium">Medium Priority</option>

                <option value="Low">Low Priority</option>

            </select>

            <button id="addBtn">

                Add Task

            </button>

        </div>

        <!-- Search -->

        <input
            type="text"
            id="search"
            placeholder="Search Task">

        <!-- Filter -->

        <div class="filter">

            <button id="allBtn">All</button>

            <button id="pendingBtn">Pending</button>

            <button id="completedBtn">Completed</button>

        </div>

        <!-- Counter -->

        <div class="counter">

            <p>Total :
                <span id="total">0</span>
            </p>

            <p>Completed :
                <span id="completed">0</span>
            </p>

            <p>Pending :
                <span id="pending">0</span>
            </p>

        </div>

        <!-- Task List -->

        <ul id="taskList">

        </ul>

        <!-- Reset -->

        <button id="resetBtn">

            Reset All

        </button>

    </div>

    <script src="script6.js"></script>

</body>

</html>
